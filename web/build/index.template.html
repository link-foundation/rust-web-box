<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>rust-web-box</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./glue/boot.css" />

    <!-- VS Code workbench configuration. Substituted at build time. -->
    <meta id="vscode-workbench-web-configuration" data-settings="{{WORKBENCH_WEB_CONFIGURATION}}" />
    <meta id="vscode-workbench-builtin-extensions" data-settings="[]" />

    <link rel="stylesheet" href="./vscode-web/out/vs/workbench/workbench.web.main.internal.css" />
    <style id="vscode-css-modules" type="text/css" media="screen"></style>
  </head>
  <body aria-label="rust-web-box workbench">
    <div id="boot-overlay" class="boot-overlay" aria-live="polite">
      <div class="boot-card">
        <h1>rust-web-box</h1>
        <p class="tagline">Anonymous in-browser Rust sandbox.</p>
        <ol id="boot-steps">
          <li data-step="shell">Static shell <strong>loaded</strong>.</li>
          <li data-step="shim">Network shim <strong data-status="shim">checking…</strong></li>
          <li data-step="cheerpx">CheerpX engine <strong data-status="cheerpx">loading…</strong></li>
          <li data-step="vm">Linux VM <strong data-status="vm">waiting…</strong></li>
          <li data-step="vscode">VS Code Web <strong data-status="vscode">waiting…</strong></li>
        </ol>
        <p class="hint">First load can take 1–2 minutes (≈30 MB editor + ≈400 MB Linux disk). Subsequent loads use the cache.</p>
      </div>
    </div>

    <script type="module" src="./glue/boot.js"></script>
    <script>
      // VS Code workbench main entry point (vendored).
      // The bundle reads the meta-tag config above and mounts itself into
      // <body>. We detect failure (e.g. when the bundle hasn't been
      // vendored yet) by leaving the boot-overlay visible if no
      // workbench mounts within 30 s.
      window._VSCODE_FILE_ROOT = './vscode-web/out/';
    </script>
    <script src="./vscode-web/out/nls.messages.js" onerror="window.__vscodeMissing=true"></script>
    <script type="module" src="./vscode-web/out/vs/workbench/workbench.web.main.internal.js" onerror="window.__vscodeMissing=true"></script>
  </body>
</html>
