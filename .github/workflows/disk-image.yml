name: Build disk image

on:
  push:
    branches:
      - main
    paths:
      - 'web/disk/**'
      - '.github/workflows/disk-image.yml'
  pull_request:
    paths:
      - 'web/disk/**'
      - '.github/workflows/disk-image.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload the .ext2 to (default: disk-latest, a rolling tag).'
        required: false
        default: 'disk-latest'

jobs:
  build:
    name: Build rust-alpine.ext2
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (for i386 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install e2fsprogs
        run: sudo apt-get update -qq && sudo apt-get install -y -qq e2fsprogs

      - name: Build rust-alpine.ext2
        run: |
          cd "$GITHUB_WORKSPACE"
          ./web/disk/build.sh

      - name: Smoke-test the image (mount + cargo run)
        run: |
          set -euo pipefail
          MNT=$(mktemp -d)
          sudo mount -o loop web/disk/rust-alpine.ext2 "$MNT"
          cleanup() {
            sudo umount "$MNT" || true
            rmdir "$MNT" || true
          }
          trap cleanup EXIT
          ls -la "$MNT"
          test -f "$MNT/workspace/Cargo.toml" \
            || (echo "missing /workspace/Cargo.toml in image" && exit 1)
          test -f "$MNT/workspace/src/main.rs" \
            || (echo "missing /workspace/src/main.rs in image" && exit 1)
          test -x "$MNT/usr/bin/cargo" \
            || (echo "missing /usr/bin/cargo in image" && exit 1)
          test -x "$MNT/usr/bin/tree" \
            || (echo "missing /usr/bin/tree in image" && exit 1)
          test -x "$MNT/bin/bash" \
            || (echo "missing /bin/bash in image" && exit 1)
          # Issue #17: verify BOTH the debug AND the release pre-bakes
          # exist in the image. If either is missing, plain `cargo run`
          # in the browser would have to allocate fresh inodes from
          # scratch, which trips the CheerpX 1.3.0 OverlayDevice 'a1'
          # wedge. The pre-baked artifacts let cargo's mtime check
          # finish early ("Finished … 0.00s") instead.
          test -x "$MNT/workspace/target/release/hello" \
            || (echo "missing /workspace/target/release/hello in image (cargo build --release pre-bake failed)" && exit 1)
          test -x "$MNT/workspace/target/debug/hello" \
            || (echo "missing /workspace/target/debug/hello in image (cargo build pre-bake failed — this is the issue #17 mitigation; do not remove)" && exit 1)
          sudo chroot "$MNT" /bin/bash -lc '
            set -euo pipefail
            tree --version
            cargo --version
            cd /workspace
            # Issue #17: smoke both `cargo run --release` (the prebuilt
            # path the user hits via tasks.json default) and plain
            # `cargo run` (the path that historically wedged CheerpX).
            # On real Linux both succeed instantly because the artifact
            # is already up-to-date — that is the whole point of the
            # pre-bakes.
            for variant in "--release" ""; do
              cargo_output=$(cargo run $variant 2>&1) || {
                status=$?
                printf "%s\n" "$cargo_output"
                echo "cargo run $variant failed inside disk smoke test"
                exit "$status"
              }
              printf "%s\n" "$cargo_output"
              [[ "$cargo_output" == *"Hello from rust-web-box!"* ]] \
                || (echo "missing hello output from cargo run $variant" && exit 1)
              [[ "$cargo_output" == *"This binary was compiled inside CheerpX."* ]] \
                || (echo "missing CheerpX output from cargo run $variant" && exit 1)
            done
          '

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: rust-alpine-ext2
          path: web/disk/rust-alpine.ext2
          if-no-files-found: error
          # Workflow artifacts cap at 10 GB; the image is ~600 MB.
          retention-days: 14

      # On main and on workflow_dispatch we publish the image to a
      # rolling release tag. The Pages workflow downloads that release
      # asset server-side, splits it into same-origin GitHubDevice
      # chunks, and deploys those chunks with the static site.
      - name: Publish as Release asset (rolling tag)
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag || 'disk-latest' }}"
          # Recreate the release each time so download URLs stay
          # stable but the asset is fresh. Skip if release already
          # exists; we just upload --clobber.
          gh release create "$TAG" \
            --title "Disk image: $TAG" \
            --notes "rust-alpine.ext2 produced by .github/workflows/disk-image.yml @ ${{ github.sha }}" \
            --target "$GITHUB_SHA" \
            || true
          gh release upload "$TAG" web/disk/rust-alpine.ext2 --clobber
          echo "Released to https://github.com/${{ github.repository }}/releases/tag/$TAG"

      - name: Redeploy Pages with fresh disk chunks
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag || 'disk-latest' }}"
          if [ "$TAG" != "disk-latest" ]; then
            echo "Skipping Pages redeploy for non-default disk tag: $TAG"
            exit 0
          fi
          gh workflow run pages.yml --ref main
