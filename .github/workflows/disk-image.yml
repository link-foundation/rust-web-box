name: Build disk image

on:
  push:
    branches:
      - main
    paths:
      - 'web/disk/**'
      - '.github/workflows/disk-image.yml'
  pull_request:
    paths:
      - 'web/disk/**'
      - '.github/workflows/disk-image.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload the .ext2 to (e.g. disk-2026-04-29).'
        required: false

jobs:
  build:
    name: Build rust-alpine.ext2
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for i386 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install e2fsprogs
        run: sudo apt-get update -qq && sudo apt-get install -y -qq e2fsprogs

      - name: Build rust-alpine.ext2
        run: |
          cd "$GITHUB_WORKSPACE"
          ./web/disk/build.sh

      - name: Smoke-test the image (mount + ls)
        run: |
          set -e
          MNT=$(mktemp -d)
          sudo mount -o loop,ro web/disk/rust-alpine.ext2 "$MNT"
          ls -la "$MNT"
          test -f "$MNT/workspace/hello/Cargo.toml" \
            || (echo "missing /workspace/hello/Cargo.toml in image" && exit 1)
          test -f "$MNT/workspace/hello/src/main.rs" \
            || (echo "missing /workspace/hello/src/main.rs in image" && exit 1)
          test -x "$MNT/usr/bin/cargo" \
            || (echo "missing /usr/bin/cargo in image" && exit 1)
          test -x "$MNT/bin/bash" \
            || (echo "missing /bin/bash in image" && exit 1)
          sudo umount "$MNT"

      - name: Upload as workflow artifact (PR builds + main)
        uses: actions/upload-artifact@v4
        with:
          name: rust-alpine-ext2
          path: web/disk/rust-alpine.ext2
          if-no-files-found: error
          # Workflow artifacts cap at 10 GB; the image is ~600 MB so
          # this is fine. Retention is 14 days by default.
          retention-days: 14

      - name: Publish as Release asset
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          # Create the release if it doesn't exist; ignore failures
          # (re-running the workflow against an existing tag is fine).
          gh release create "$TAG" \
            --title "Disk image: $TAG" \
            --notes "rust-alpine.ext2 produced by .github/workflows/disk-image.yml" \
            || true
          gh release upload "$TAG" web/disk/rust-alpine.ext2 --clobber
