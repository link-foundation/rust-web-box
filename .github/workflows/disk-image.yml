name: Build disk image

on:
  push:
    branches:
      - main
    paths:
      - 'web/disk/**'
      - '.github/workflows/disk-image.yml'
  pull_request:
    paths:
      - 'web/disk/**'
      - '.github/workflows/disk-image.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload the .ext2 to (default: disk-latest, a rolling tag).'
        required: false
        default: 'disk-latest'

jobs:
  build:
    name: Build rust-alpine.ext2
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up QEMU (for i386 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install e2fsprogs + binutils
        # binutils provides the host runner's native `readelf`, used by the
        # issue #41 lld regression guard to inspect the i386 binaries on the
        # mounted image (see the smoke-test step). The runner image already
        # ships binutils, but install it explicitly so the guard never
        # depends on an undocumented pre-install.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq e2fsprogs binutils

      - name: Build rust-alpine.ext2
        run: |
          cd "$GITHUB_WORKSPACE"
          ./web/disk/build.sh

      - name: Smoke-test the image (mount + cargo run)
        run: |
          set -euo pipefail
          SMOKE_IMG=$(mktemp --suffix=.ext2)
          cp web/disk/rust-alpine.ext2 "$SMOKE_IMG"
          MNT=$(mktemp -d)
          sudo mount -o loop "$SMOKE_IMG" "$MNT"
          cleanup() {
            sudo umount "$MNT" || true
            rmdir "$MNT" || true
            rm -f "$SMOKE_IMG"
          }
          trap cleanup EXIT
          ls -la "$MNT"
          test -f "$MNT/workspace/Cargo.toml" \
            || (echo "missing /workspace/Cargo.toml in image" && exit 1)
          test -f "$MNT/workspace/src/main.rs" \
            || (echo "missing /workspace/src/main.rs in image" && exit 1)
          test -x "$MNT/usr/bin/cargo" \
            || (echo "missing /usr/bin/cargo in image" && exit 1)
          test -x "$MNT/usr/bin/tree" \
            || (echo "missing /usr/bin/tree in image" && exit 1)
          test -x "$MNT/bin/bash" \
            || (echo "missing /bin/bash in image" && exit 1)
          # Issue #17: verify BOTH the debug AND the release pre-bakes
          # exist in the image. If either is missing, plain `cargo run`
          # in the browser would have to allocate fresh inodes from
          # scratch, which trips the CheerpX 1.3.x OverlayDevice 'a1'
          # wedge. The pre-baked artifacts let cargo's mtime check
          # finish early ("Finished … 0.00s") instead.
          test -x "$MNT/workspace/target/release/hello" \
            || (echo "missing /workspace/target/release/hello in image (cargo build --release pre-bake failed)" && exit 1)
          test -x "$MNT/workspace/target/debug/hello" \
            || (echo "missing /workspace/target/debug/hello in image (cargo build pre-bake failed — this is the issue #17 mitigation; do not remove)" && exit 1)
          # Issue #41: the `cargo check` pre-bake warms the check
          # fingerprint so the first in-browser `cargo check` reuses
          # inodes. Verify it ran (it writes a .fingerprint but no
          # binary, so check for the metadata dir).
          test -d "$MNT/workspace/target/debug/.fingerprint" \
            || (echo "missing /workspace/target/debug/.fingerprint in image (cargo check pre-bake failed — issue #41)" && exit 1)
          sudo chroot "$MNT" /bin/bash -lc '
            set -euo pipefail
            # Replicate the in-browser CheerpX VM environment: it runs as
            # root with HOME=/root, so cargo reads the lld config at
            # /root/.cargo/config.toml and the recompile below links with
            # lld. sudo chroot does not guarantee HOME=/root (GitHub Actions
            # sudo can leak HOME=/home/runner), so set it explicitly.
            export HOME=/root
            tree --version
            cargo --version
            cd /workspace
            # Issue #17: smoke both `cargo run --release` (the prebuilt
            # path the user hits via tasks.json default) and plain
            # `cargo run` (the path that historically wedged CheerpX).
            # On real Linux both succeed instantly because the artifact
            # is already up-to-date — that is the whole point of the
            # pre-bakes.
            for variant in "--release" ""; do
              cargo_output=$(cargo run $variant 2>&1) || {
                status=$?
                printf "%s\n" "$cargo_output"
                echo "cargo run $variant failed inside disk smoke test"
                exit "$status"
              }
              printf "%s\n" "$cargo_output"
              # The prebuilt binary is the canonical `cargo new` program
              # (issue #33): no branding, just "Hello, world!".
              [[ "$cargo_output" == *"Hello, world!"* ]] \
                || (echo "missing hello-world output from cargo run $variant" && exit 1)
            done
            printf "%s\n" \
              "fn main() {" \
              "    println!(\"edited smoke output from disk image\");" \
              "}" \
              > src/main.rs
            edited_output=$(cargo run 2>&1) || {
              status=$?
              printf "%s\n" "$edited_output"
              echo "edited cargo run failed inside disk smoke test"
              exit "$status"
            }
            printf "%s\n" "$edited_output"
            [[ "$edited_output" == *"edited smoke output from disk image"* ]] \
              || (echo "edited cargo run did not use updated src/main.rs" && exit 1)
            # Issue #41: the fast edit→feedback lever. `cargo check` must
            # succeed on the edited source without emitting a binary.
            check_output=$(cargo check 2>&1) || {
              status=$?
              printf "%s\n" "$check_output"
              echo "cargo check failed inside disk smoke test (issue #41)"
              exit "$status"
            }
            printf "%s\n" "$check_output"
          '
          # Issue #41 regression guard (host-side, native readelf).
          # The shipped fix links with lld instead of GNU ld — the
          # measured −85% link-time syscall win that makes the in-VM
          # rebuild fast. Assert the binaries on the image carry lld's
          # signature: lld stamps "Linker: LLD <ver>" into .comment,
          # GNU ld does not. A future revert of the lld config then
          # fails CI loudly instead of silently shipping the slow linker.
          #
          # Run this on the HOST, not in the chroot: the in-image readelf
          # is an i386 binary that would execute under the runner's QEMU
          # emulation, and inspecting an ELF needs no emulation at all.
          # The host's native readelf (binutils, installed above) reads
          # i386 ELF files directly. Check the pristine release pre-bake
          # (proves the lld config produces lld binaries) AND the debug
          # binary the chroot just recompiled from the edited source
          # (proves an in-VM edit→rebuild also links with lld).
          for bin in \
            "$MNT/workspace/target/release/hello" \
            "$MNT/workspace/target/debug/hello"; do
            comment=$(readelf -p .comment "$bin" 2>/dev/null || true)
            printf '%s .comment:\n%s\n' "$bin" "$comment"
            printf '%s' "$comment" | grep -qi 'LLD' \
              || { echo "$bin not linked with lld — issue #41 fix regressed"; exit 1; }
          done

      - name: Build workbench and stage fresh disk chunks
        run: |
          node web/build/build-workbench.mjs
          WARM_DISK_SOURCE_PATH=web/disk/rust-alpine.ext2 node web/build/stage-pages-disk.mjs

      - name: Install browser-commander + Playwright
        working-directory: web/tests
        run: npm ci

      - name: Install Playwright system deps
        timeout-minutes: 5
        working-directory: web/tests
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo -E npx playwright install-deps chromium

      - name: Install Chromium browser for Playwright
        timeout-minutes: 5
        working-directory: web/tests
        run: npx playwright install chromium

      - name: Run local e2e against fresh disk image
        working-directory: web/tests
        env:
          RUST_WEB_BOX_E2E: '1'
          RUST_WEB_BOX_E2E_NO_SANDBOX: '1'
          RUST_WEB_BOX_E2E_BOOT_MS: '180000'
        run: node --test e2e/local-pages-e2e.test.mjs

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: rust-alpine-ext2
          path: web/disk/rust-alpine.ext2
          if-no-files-found: error
          # Workflow artifacts cap at 10 GB; the image is ~600 MB.
          retention-days: 14

      # On main and on workflow_dispatch we publish the image to a
      # rolling release tag. The Pages workflow downloads that release
      # asset server-side, splits it into same-origin GitHubDevice
      # chunks, and deploys those chunks with the static site.
      - name: Publish as Release asset (rolling tag)
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag || 'disk-latest' }}"
          # Recreate the release each time so download URLs stay
          # stable but the asset is fresh. Skip if release already
          # exists; we just upload --clobber.
          gh release create "$TAG" \
            --title "Disk image: $TAG" \
            --notes "rust-alpine.ext2 produced by .github/workflows/disk-image.yml @ ${{ github.sha }}" \
            --target "$GITHUB_SHA" \
            || true
          gh release upload "$TAG" web/disk/rust-alpine.ext2 --clobber
          echo "Released to https://github.com/${{ github.repository }}/releases/tag/$TAG"

      - name: Redeploy Pages with fresh disk chunks
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag || 'disk-latest' }}"
          if [ "$TAG" != "disk-latest" ]; then
            echo "Skipping Pages redeploy for non-default disk tag: $TAG"
            exit 0
          fi
          gh workflow run pages.yml --ref main
