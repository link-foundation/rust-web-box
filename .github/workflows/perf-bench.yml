name: Performance benchmark (issue #41)

# On-demand ONLY. konard asked (PR #42) to keep every benchmark runnable on
# demand via CI manual dispatch "to reduce load on your machine" — so this
# workflow has no push/PR/schedule trigger. Dispatch it with:
#
#   gh workflow run perf-bench.yml --ref <branch> \
#     -f configs=shipped,jobs1,jobs4 -f run_native=true -f run_in_vm=true
#
# It produces two pieces of evidence for the issue #41 case study:
#   1. native  — the SAME compile work run natively on i386 Alpine (no
#      CheerpX), per profile knob, via experiments/issue-41/measure.sh.
#   2. in-vm   — the user's ACTUAL cargo run/build/check timed inside the
#      real in-browser CheerpX VM, plus a read-only storage + CPU probe,
#      via web/tests/bench/run-in-vm-bench.mjs.
#
# Both jobs write a Markdown report to the job summary and upload artifacts.
on:
  workflow_dispatch:
    inputs:
      configs:
        description: 'In-VM bench configs (comma-separated): shipped, incremental, jobs1, jobs4'
        required: false
        default: 'shipped'
      time_passes:
        description: 'Capture the rustc -Z time-passes front-end/codegen/link split'
        required: false
        type: boolean
        default: true
      run_native:
        description: 'Run the native i386 Alpine measurement rig (measure.sh)'
        required: false
        type: boolean
        default: true
      run_in_vm:
        description: 'Run the in-VM CheerpX cargo benchmark (real browser)'
        required: false
        type: boolean
        default: true
      disk_source:
        description: 'Warm disk for the in-VM job: "release" (download disk-latest) or "build" (build fresh)'
        required: false
        default: 'release'
      bench_timeout_ms:
        description: 'Per-config in-VM bench timeout in ms (default 30 min)'
        required: false
        default: '1800000'

jobs:
  native:
    name: Native i386 measurement rig
    if: ${{ inputs.run_native == true || inputs.run_native == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (i386 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build measurement image
        run: |
          docker build \
            --platform linux/386 \
            -f experiments/issue-41/Dockerfile.measure \
            -t rwb-measure \
            experiments/issue-41

      - name: Run measurement rig
        run: |
          mkdir -p experiments/issue-41/results/ci-native
          docker run --rm \
            --platform linux/386 \
            -v "$PWD/experiments/issue-41/results/ci-native:/out" \
            rwb-measure

      - name: Publish native summary
        run: |
          {
            echo "# Native i386 measurement rig (issue #41)"
            echo
            echo "Same compile work as the in-browser disk, run natively (no CheerpX)."
            echo "Isolates how much of the rebuild is the compile itself vs. the"
            echo "browser execution environment."
            echo
            cat experiments/issue-41/results/ci-native/summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload native measurement artifacts
        uses: actions/upload-artifact@v5
        with:
          name: issue-41-native-measurements
          path: experiments/issue-41/results/ci-native/**
          if-no-files-found: error
          retention-days: 30

  in-vm:
    name: In-VM CheerpX cargo benchmark
    if: ${{ inputs.run_in_vm == true || inputs.run_in_vm == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Building the disk fresh needs QEMU + e2fsprogs; downloading the
      # published release does not. We only set those up for disk_source=build.
      - name: Set up QEMU (for fresh disk build)
        if: ${{ inputs.disk_source == 'build' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx (for fresh disk build)
        if: ${{ inputs.disk_source == 'build' }}
        uses: docker/setup-buildx-action@v3

      - name: Install e2fsprogs (for fresh disk build)
        if: ${{ inputs.disk_source == 'build' }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq e2fsprogs

      - name: Build fresh rust-alpine.ext2
        if: ${{ inputs.disk_source == 'build' }}
        run: ./web/disk/build.sh

      - name: Build workbench
        run: node web/build/build-workbench.mjs

      - name: Stage warm disk (fresh build)
        if: ${{ inputs.disk_source == 'build' }}
        run: WARM_DISK_SOURCE_PATH=web/disk/rust-alpine.ext2 node web/build/stage-pages-disk.mjs

      - name: Stage warm disk (published release)
        if: ${{ inputs.disk_source != 'build' }}
        run: |
          WARM_DISK_SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/disk-latest/rust-alpine.ext2" \
            node web/build/stage-pages-disk.mjs

      - name: Install browser-commander + Playwright
        working-directory: web/tests
        run: npm ci

      - name: Install Playwright system deps
        timeout-minutes: 5
        working-directory: web/tests
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo -E npx playwright install-deps chromium

      - name: Install Chromium browser for Playwright
        timeout-minutes: 5
        working-directory: web/tests
        run: npx playwright install chromium

      - name: Run in-VM cargo benchmark
        working-directory: web/tests
        env:
          RUST_WEB_BOX_E2E: '1'
          RUST_WEB_BOX_E2E_NO_SANDBOX: '1'
          RUST_WEB_BOX_E2E_BOOT_MS: '180000'
        run: |
          node bench/run-in-vm-bench.mjs \
            --configs "${{ inputs.configs }}" \
            --timeout-ms "${{ inputs.bench_timeout_ms }}" \
            ${{ (inputs.time_passes == false || inputs.time_passes == 'false') && '--no-time-passes' || '' }} \
            --out "$GITHUB_WORKSPACE/docs/case-studies/issue-41/data/in-vm-bench-ci.md"

      - name: Upload in-VM benchmark report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: issue-41-in-vm-bench
          path: docs/case-studies/issue-41/data/in-vm-bench-ci.md
          if-no-files-found: warn
          retention-days: 30
